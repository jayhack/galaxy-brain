<!doctype html>
<html lang="en" data-theme="lofi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>galaxy-brain — agent evals</title>
    <meta
      name="description"
      content="A collection of agent evals. Browse evals, harnesses, models, and outcomes."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        daisyui: {
          themes: [
            "lofi",
            "light",
            "cupcake",
            "emerald",
            "corporate",
            "retro",
            "garden",
            "pastel",
            "nord",
            "autumn",
            "winter",
            "night",
            "dracula",
            "synthwave",
            "business",
          ],
        },
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'monospace'],
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body class="min-h-screen bg-base-100 text-base-content font-sans antialiased">
    <div class="drawer lg:drawer-open">
      <input id="nav-drawer" type="checkbox" class="drawer-toggle" />

      <div class="drawer-content flex flex-col">
        <!-- Navbar -->
        <header
          id="main-navbar"
          class="flex flex-col lg:flex-row lg:items-center lg:min-h-16 lg:h-16 bg-base-200/70 backdrop-blur sticky top-0 z-30 border-b border-base-300"
        >
          <!-- Top bar: menu, brand, actions. On lg, breadcrumbs render in the row below in DOM but order before this via lg:order-2 -->
          <div
            class="navbar min-h-0 h-auto py-0 flex flex-row flex-nowrap items-center justify-between min-h-14 h-14 shrink-0 lg:min-h-16 lg:h-16 lg:flex-none lg:order-2 lg:w-auto"
          >
            <div class="flex-none lg:hidden">
              <label for="nav-drawer" class="btn btn-square btn-ghost" aria-label="open menu">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="inline-block w-5 h-5 stroke-current"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16"
                  />
                </svg>
              </label>
            </div>

            <a
              id="navbar-brand"
              href="#/"
              class="btn btn-ghost normal-case text-base gap-1.5 shrink min-w-0 lg:hidden px-2"
            >
              <span
                class="inline-flex items-center justify-center w-6 h-6 shrink-0 rounded-md bg-gradient-to-br from-primary to-secondary text-base leading-none select-none"
                aria-hidden="true"
                >🧠</span
              >
              <span class="font-semibold tracking-tight truncate">galaxy-brain</span>
              <span class="badge badge-ghost badge-sm hidden sm:inline-flex shrink-0">agent evals</span>
            </a>

            <div class="flex-1 min-w-0 lg:hidden" aria-hidden="true"></div>

            <div class="flex-none gap-2 flex items-center">
            <div class="dropdown dropdown-end">
              <label tabindex="0" class="btn btn-ghost btn-sm gap-1" title="theme">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-4 h-4 fill-current"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9z"
                  />
                </svg>
                <span class="hidden sm:inline">theme</span>
              </label>
              <ul
                tabindex="0"
                class="dropdown-content menu p-2 shadow bg-base-200 rounded-box w-40 mt-2 z-40"
                id="theme-menu"
              >
                <!-- populated by app.js -->
              </ul>
            </div>
            </div>
          </div>

          <div
            id="header-breadcrumbs"
            class="order-3 w-full min-w-0 border-t border-base-300/80 py-2 px-4 sm:px-6 lg:order-1 lg:flex-1 lg:border-t-0 lg:py-0 lg:px-10 flex items-center overflow-x-auto overflow-y-hidden lg:overflow-hidden max-w-6xl lg:mx-auto"
            aria-live="polite"
          ></div>
        </header>

        <!-- View root -->
        <main id="view" class="flex-1 px-4 sm:px-6 lg:px-10 py-8 max-w-6xl w-full mx-auto">
          <div class="flex items-center justify-center py-24">
            <span class="loading loading-dots loading-lg text-primary"></span>
          </div>
        </main>

        <footer class="footer footer-center p-6 text-base-content/60 border-t border-base-300">
          <aside>
            <p class="text-xs">
              galaxy-brain · static site ·
              <a id="footer-repo-link" class="link link-hover" href="#">view source</a>
            </p>
          </aside>
        </footer>
      </div>

      <!-- Sidebar -->
      <aside class="drawer-side z-40">
        <label for="nav-drawer" class="drawer-overlay" aria-label="close menu"></label>
        <div
          class="min-h-full w-72 bg-base-200 border-r border-base-300 flex flex-col"
        >
          <div
            class="sidebar-brand shrink-0 h-16 min-h-16 px-4 border-b border-base-300 flex items-center overflow-hidden"
          >
            <a href="#/" class="flex items-center gap-2 min-w-0 flex-1">
              <span
                class="inline-flex items-center justify-center w-8 h-8 shrink-0 rounded-lg bg-gradient-to-br from-primary to-secondary text-lg leading-none select-none"
                aria-hidden="true"
                >🧠</span
              >
              <div
                class="min-w-0 flex-1 h-8 flex flex-col justify-between py-0.5"
              >
                <span class="text-xs font-semibold leading-none tracking-tight truncate"
                  >galaxy-brain</span
                >
                <p class="text-[10px] leading-none text-base-content/60 truncate">
                  A collection of agent evals.
                </p>
              </div>
            </a>
          </div>

          <nav id="sidebar-nav" class="p-2 flex-1 overflow-y-auto">
            <!-- populated by app.js -->
          </nav>
        </div>
      </aside>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fish tank water — cursor-composer-2</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      background: #000; font-family: system-ui, sans-serif;
    }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      padding: 10px 14px; border-radius: 8px;
      background: rgba(12, 18, 28, 0.75);
      border: 1px solid rgba(120, 200, 255, 0.25);
      color: #cde8ff; font-size: 13px; line-height: 1.45;
      max-width: 320px;
    }
    #hud strong { color: #8adbff; }
    #reset {
      margin-top: 10px; padding: 8px 16px; cursor: pointer;
      border: 1px solid rgba(120, 200, 255, 0.45);
      border-radius: 6px; background: rgba(40, 80, 130, 0.5);
      color: #eaf4ff; font-size: 14px;
    }
    #reset:hover { background: rgba(60, 110, 170, 0.65); }
    #phase { margin-top: 8px; color: #ffe08a; font-weight: 600; }
  </style>
</head>
<body>
  <div id="hud">
    <strong>Fish tank pour + slosh</strong>
    <div>Drag to orbit · Wheel to zoom · Move mouse over water to disturb</div>
    <div id="phase">Phase: —</div>
    <button type="button" id="reset">Reset</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.1/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.1/examples/jsm/controls/OrbitControls.js";

    const TANK_HALF = 1;
    const GRID = 96;
    const dt = 1 / 60;
    const waveSpeed = 1.35;
    const waveDamp = 0.012;
    const mouseImpulse = 0.42;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.05, 100);
    camera.position.set(3.2, 2.1, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.15, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.maxPolarAngle = Math.PI * 0.49;
    controls.minDistance = 2;
    controls.maxDistance = 12;

    scene.add(new THREE.AmbientLight(0x88aaff, 0.35));
    const key = new THREE.DirectionalLight(0xffffff, 1.05);
    key.position.set(4, 8, 5);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xaaccff, 0.35);
    fill.position.set(-5, 3, -4);
    scene.add(fill);

    // Glass cube (hollow look: transparent box + edge lines)
    const glassGeo = new THREE.BoxGeometry(
      TANK_HALF * 2 + 0.04,
      TANK_HALF * 2 + 0.04,
      TANK_HALF * 2 + 0.04
    );
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0xc8e8ff,
      metalness: 0,
      roughness: 0.08,
      transmission: 0.92,
      thickness: 0.5,
      transparent: true,
      opacity: 0.35,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    const glass = new THREE.Mesh(glassGeo, glassMat);
    scene.add(glass);

    const edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(glassGeo),
      new THREE.LineBasicMaterial({ color: 0xbee6ff, transparent: true, opacity: 0.85 })
    );
    glass.add(edges);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({
        color: 0x020204,
        metalness: 0.2,
        roughness: 0.95,
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -TANK_HALF - 0.02;
    scene.add(floor);

    // --- Wave height field (surface displacement) ---
    const nx = GRID;
    const nz = GRID;
    const nxp = nx + 1;
    const nzp = nz + 1;
    const count = nxp * nzp;
    const u = new Float32Array(count);
    const uPrev = new Float32Array(count);
    const vel = new Float32Array(count);

    function idx(i, j) {
      return j * nxp + i;
    }

    const dx = (TANK_HALF * 2) / nx;
    const c0 = (waveSpeed * dt) / dx;
    const cSq = c0 * c0;

    // Plane in XZ, y up
    const waterGeo = new THREE.PlaneGeometry(
      TANK_HALF * 2 - 0.02,
      TANK_HALF * 2 - 0.02,
      nx,
      nz
    );
    waterGeo.rotateX(-Math.PI / 2);

    const waterMat = new THREE.MeshPhysicalMaterial({
      color: 0x1a6aaa,
      metalness: 0.02,
      roughness: 0.12,
      transmission: 0.55,
      thickness: 0.85,
      ior: 1.33,
      transparent: true,
      opacity: 0.92,
      side: THREE.DoubleSide,
      envMapIntensity: 1,
    });
    const waterMesh = new THREE.Mesh(waterGeo, waterMat);
    waterMesh.position.y = 0;
    scene.add(waterMesh);

    const positions = waterGeo.attributes.position;
    const baseY = new Float32Array(count);
    for (let j = 0; j <= nz; j++) {
      for (let i = 0; i <= nx; i++) {
        const k = idx(i, j);
        baseY[k] = positions.getY(k);
      }
    }

    // Pour visuals: reservoir block above + stream
    const RES_BOX_H = 0.35;
    const resGeo = new THREE.BoxGeometry(1.4, RES_BOX_H, 1.4);
    const resMat = new THREE.MeshPhysicalMaterial({
      color: 0x2a8ad0,
      metalness: 0,
      roughness: 0.2,
      transmission: 0.45,
      transparent: true,
      opacity: 0.78,
    });
    const reservoir = new THREE.Mesh(resGeo, resMat);
    reservoir.position.set(0, TANK_HALF + 1.35, 0);
    scene.add(reservoir);

    const streamGeo = new THREE.CylinderGeometry(0.12, 0.16, 1, 16, 1, true);
    const streamMat = new THREE.MeshPhysicalMaterial({
      color: 0x4aa8e8,
      metalness: 0,
      roughness: 0.15,
      transmission: 0.7,
      transparent: true,
      opacity: 0.55,
      side: THREE.DoubleSide,
    });
    const stream = new THREE.Mesh(streamGeo, streamMat);
    stream.position.set(0, 0, 0);
    scene.add(stream);

    let pourT = 0;
    let pourDur = 4.2;
    let baseWaterY = -TANK_HALF + 0.08;
    let targetFillY = TANK_HALF - 0.12;
    let surfaceY = baseWaterY;
    let phase = "pour";
    const phaseEl = document.getElementById("phase");

    function smoothstep(t) {
      const x = Math.min(1, Math.max(0, t));
      return x * x * (3 - 2 * x);
    }

    function resetSim() {
      pourT = 0;
      surfaceY = baseWaterY;
      phase = "pour";
      u.fill(0);
      uPrev.fill(0);
      vel.fill(0);
      reservoir.visible = true;
      stream.visible = true;
      reservoir.scale.set(1, 1, 1);
      reservoir.position.y = TANK_HALF + 1.35;
      updateWaterGeometry();
    }

    function waveStep() {
      if (phase !== "slosh") return;

      for (let k = 0; k < count; k++) vel[k] = u[k] - uPrev[k];

      for (let j = 1; j < nz; j++) {
        for (let i = 1; i < nx; i++) {
          const id = idx(i, j);
          const lap =
            u[idx(i - 1, j)] +
            u[idx(i + 1, j)] +
            u[idx(i, j - 1)] +
            u[idx(i, j + 1)] -
            4 * u[id];
          let un = 2 * u[id] - uPrev[id] + cSq * lap - waveDamp * vel[id];
          uPrev[id] = u[id];
          u[id] = un;
        }
      }
      // Edge clamp (pinned rim)
      for (let i = 0; i <= nx; i++) {
        u[idx(i, 0)] = u[idx(i, 1)] * 0.5;
        u[idx(i, nz)] = u[idx(i, nz - 1)] * 0.5;
      }
      for (let j = 0; j <= nz; j++) {
        u[idx(0, j)] = u[idx(1, j)] * 0.5;
        u[idx(nx, j)] = u[idx(nx - 1, j)] * 0.5;
      }
    }

    function updateWaterGeometry() {
      for (let j = 0; j <= nz; j++) {
        for (let i = 0; i <= nx; i++) {
          const k = idx(i, j);
          const disp = phase === "slosh" ? u[k] : 0;
          positions.setY(k, baseY[k] + surfaceY + disp);
        }
      }
      positions.needsUpdate = true;
      waterGeo.computeVertexNormals();
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const hit = new THREE.Vector3();

    function onPointerMove(ev) {
      pointer.x = (ev.clientX / innerWidth) * 2 - 1;
      pointer.y = -(ev.clientY / innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      plane.constant = -surfaceY;
      if (!raycaster.ray.intersectPlane(plane, hit)) return;
      if (
        Math.abs(hit.x) > TANK_HALF - 0.05 ||
        Math.abs(hit.z) > TANK_HALF - 0.05
      ) {
        return;
      }

      const fx = ((hit.x + TANK_HALF) / (2 * TANK_HALF)) * nx;
      const fz = ((hit.z + TANK_HALF) / (2 * TANK_HALF)) * nz;
      const ci = Math.round(fx);
      const cj = Math.round(fz);
      const r = 5;
      for (let dj = -r; dj <= r; dj++) {
        for (let di = -r; di <= r; di++) {
          const ii = ci + di;
          const jj = cj + dj;
          if (ii < 1 || ii >= nx || jj < 1 || jj >= nz) continue;
          const dd = di * di + dj * dj;
          const w = Math.exp(-dd / 12) * mouseImpulse;
          u[idx(ii, jj)] += w;
          uPrev[idx(ii, jj)] += w * 0.35;
        }
      }
    }
    window.addEventListener("pointermove", onPointerMove);

    window.addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    document.getElementById("reset").addEventListener("click", () => {
      resetSim();
    });

    function animate() {
      requestAnimationFrame(animate);
      const t = performance.now() * 0.001;

      if (phase === "pour") {
        pourT += dt;
        const p = Math.min(1, pourT / pourDur);
        const sp = smoothstep(p);
        surfaceY = baseWaterY + (targetFillY - baseWaterY) * sp;

        reservoir.position.y = TANK_HALF + 1.35 + (1 - sp) * 0.4;
        reservoir.scale.y = 0.3 + (1 - sp) * 0.7;

        const top = reservoir.position.y - 0.5 * RES_BOX_H * reservoir.scale.y;
        const midY = (top + surfaceY) * 0.5;
        const len = Math.max(0.2, top - surfaceY);
        stream.position.set(0, midY, 0);
        stream.scale.set(1, len, 1);
        stream.visible = p < 0.98;

        if (p >= 1) {
          phase = "slosh";
          reservoir.visible = false;
          stream.visible = false;
          for (let j = 1; j < nz; j++) {
            for (let i = 1; i < nx; i++) {
              const id = idx(i, j);
              const dx = (i / nx - 0.5) * 2;
              const dz = (j / nz - 0.5) * 2;
              const val = 0.06 * Math.sin(dx * 9 + t) * Math.cos(dz * 7);
              u[id] = val;
              uPrev[id] = val * (0.96 + 0.08 * Math.random());
            }
          }
        }
      }

      if (phase === "slosh") {
        waveStep();
      }

      updateWaterGeometry();

      phaseEl.textContent =
        phase === "pour"
          ? "Phase: pouring…"
          : "Phase: sloshing — move the mouse over the water";

      controls.update();
      renderer.render(scene, camera);
    }

    resetSim();
    animate();
  </script>
</body>
</html>

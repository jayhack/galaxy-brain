<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fish tank — pour, slosh, disturb</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, Segoe UI, Roboto, sans-serif;
    }
    #hud {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    #hud button {
      background: #1a1a1a;
      color: #e8e8e8;
      border: 1px solid #444;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    #hud button:hover { background: #2a2a2a; }
    #hint {
      color: #888;
      font-size: 12px;
      max-width: 320px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div id="hud">
    <button type="button" id="resetBtn">Reset</button>
    <span id="hint">Drag to orbit · Move the mouse over the water to disturb it · Scroll = zoom</span>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.170.0";
    import { OrbitControls } from "https://esm.sh/three@0.170.0/examples/jsm/controls/OrbitControls.js";

    const TANK = 2;
    const HALF = TANK * 0.5;
    const N = 48;
    const DX = TANK / (N - 1);

    const WAVE_SPEED = 3.2;
    const WAVE_DAMP = 0.72;
    const POUR_DURATION = 4.2;
    const FILL_TARGET = 0.78;
    const H_MAX = 0.28;

    let scene, camera, renderer, controls;
    let waterMesh, streamGroup;
    let h, vel;
    const clock = new THREE.Clock();

    let simTime = 0;

    const raycaster = new THREE.Raycaster();
    const pointerNDC = new THREE.Vector2();
    const intersectPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const hit = new THREE.Vector3();

    let moveX = 0;
    let moveY = 0;

    function idx(i, j) {
      return i + j * N;
    }

    function resetSimulation() {
      simTime = 0;
      moveX = 0;
      moveY = 0;
      for (let k = 0; k < N * N; k++) {
        h[k] = 0;
        vel[k] = 0;
      }
    }

    function initBuffers() {
      const len = N * N;
      h = new Float32Array(len);
      vel = new Float32Array(len);
      resetSimulation();
    }

    function createWaterMesh() {
      const geom = new THREE.PlaneGeometry(TANK, TANK, N - 1, N - 1);
      geom.rotateX(-Math.PI / 2);
      const pos = geom.attributes.position;
      for (let j = 0; j < N; j++) {
        for (let i = 0; i < N; i++) {
          const ix = idx(i, j);
          pos.setXYZ(ix, -HALF + i * DX, 0, -HALF + j * DX);
        }
      }

      const mat = new THREE.MeshPhysicalMaterial({
        color: 0x149bb8,
        metalness: 0.04,
        roughness: 0.14,
        transmission: 0.52,
        thickness: 0.45,
        ior: 1.33,
        clearcoat: 0.35,
        clearcoatRoughness: 0.15,
        envMapIntensity: 0.85,
        side: THREE.DoubleSide,
      });

      return new THREE.Mesh(geom, mat);
    }

    function createGlassTank() {
      const group = new THREE.Group();
      const boxGeo = new THREE.BoxGeometry(TANK + 0.02, TANK + 0.02, TANK + 0.02);

      const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        metalness: 0,
        roughness: 0.05,
        transmission: 0.96,
        thickness: 0.12,
        ior: 1.52,
        transparent: true,
        opacity: 0.14,
        depthWrite: false,
        side: THREE.DoubleSide,
      });

      const shell = new THREE.Mesh(boxGeo, glassMat);
      group.add(shell);

      const innerFloorGeo = new THREE.PlaneGeometry(TANK - 0.1, TANK - 0.1);
      innerFloorGeo.rotateX(-Math.PI / 2);
      const innerFloor = new THREE.Mesh(
        innerFloorGeo,
        new THREE.MeshStandardMaterial({
          color: 0x1a3a32,
          roughness: 0.78,
          metalness: 0.08,
        })
      );
      innerFloor.position.y = -HALF + 0.022;
      group.add(innerFloor);

      group.add(
        new THREE.LineSegments(
          new THREE.EdgesGeometry(boxGeo),
          new THREE.LineBasicMaterial({ color: 0xb8cef5, transparent: true, opacity: 0.9 })
        )
      );

      const floorGeo = new THREE.PlaneGeometry(TANK + 0.35, TANK + 0.35);
      floorGeo.rotateX(-Math.PI / 2);
      const floor = new THREE.Mesh(
        floorGeo,
        new THREE.MeshStandardMaterial({ color: 0x080808, roughness: 0.92, metalness: 0.15 })
      );
      floor.position.y = -HALF - 0.015;
      group.add(floor);

      return group;
    }

    function createStreamVisual() {
      const group = new THREE.Group();
      const path = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0, HALF + 0.95, 0),
        new THREE.Vector3(0.04, HALF + 0.55, 0),
        new THREE.Vector3(0, HALF + 0.12, 0),
      ]);
      const tubeGeo = new THREE.TubeGeometry(path, 20, 0.085, 12, false);
      const tubeMat = new THREE.MeshPhysicalMaterial({
        color: 0x5ed4f0,
        transmission: 0.58,
        roughness: 0.1,
        thickness: 0.35,
        transparent: true,
        opacity: 0.98,
        depthWrite: false,
      });
      const stream = new THREE.Mesh(tubeGeo, tubeMat);
      group.add(stream);

      const drops = 260;
      const positions = new Float32Array(drops * 3);
      const dropGeo = new THREE.BufferGeometry();
      dropGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const points = new THREE.Points(
        dropGeo,
        new THREE.PointsMaterial({
          color: 0xb8f4ff,
          size: 0.042,
          transparent: true,
          opacity: 0.88,
          depthWrite: false,
          sizeAttenuation: true,
        })
      );
      group.add(points);

      return { group, positions, dropPoints: points };
    }

    function updateStreamVisual(strength) {
      if (!streamGroup) return;
      const { positions, dropPoints } = streamGroup.userData;
      const drops = positions.length / 3;
      const topY = HALF + 1.05;
      const mouthY = HALF + 0.02;
      for (let i = 0; i < drops; i++) {
        const t = (i / drops + simTime * 2.1) % 1;
        const wobble = Math.sin(i * 9.2 + simTime * 11) * 0.06;
        positions[i * 3] = wobble;
        positions[i * 3 + 1] = THREE.MathUtils.lerp(mouthY, topY, t);
        positions[i * 3 + 2] = Math.cos(i * 3.17 + simTime * 5) * 0.05;
      }
      dropPoints.geometry.attributes.position.needsUpdate = true;
      streamGroup.visible = strength > 0.06;
      const tube = streamGroup.children[0];
      if (tube && tube.material) {
        tube.material.opacity = Math.min(1, strength * 1.25);
      }
    }

    function waveStep(dt, pourStrength) {
      const c2 = WAVE_SPEED * WAVE_SPEED;
      const cellInvSq = 1 / (DX * DX);

      for (let j = 1; j < N - 1; j++) {
        for (let i = 1; i < N - 1; i++) {
          const k = idx(i, j);
          const lap =
            h[idx(i + 1, j)] +
            h[idx(i - 1, j)] +
            h[idx(i, j + 1)] +
            h[idx(i, j - 1)] -
            4 * h[k];

          vel[k] += c2 * lap * cellInvSq * dt;
          vel[k] *= Math.exp(-WAVE_DAMP * dt);

          const wx = -HALF + i * DX;
          const wz = -HALF + j * DX;
          const inflow =
            pourStrength *
            0.014 *
            Math.exp(-(wx * wx + wz * wz) * 4.2) *
            dt *
            55;

          vel[k] += inflow;
          h[k] += vel[k] * dt;
          h[k] = THREE.MathUtils.clamp(h[k], -H_MAX, H_MAX);
        }
      }

      for (let j = 0; j < N; j++) {
        for (let i = 0; i < N; i++) {
          if (i > 0 && i < N - 1 && j > 0 && j < N - 1) continue;
          const k = idx(i, j);
          let ii = i === 0 ? 1 : i === N - 1 ? N - 2 : i;
          let jj = j === 0 ? 1 : j === N - 1 ? N - 2 : j;
          const kIn = idx(ii, jj);
          h[k] = h[kIn] * 0.88;
          vel[k] = vel[kIn] * 0.25;
        }
      }
    }

    function applyMouseImpulse(dt) {
      const speed = Math.hypot(moveX, moveY);
      if (speed < 0.15) {
        moveX *= 0.85;
        moveY *= 0.85;
        return;
      }

      pointerNDC.x = (prevClient.x / window.innerWidth) * 2 - 1;
      pointerNDC.y = -(prevClient.y / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointerNDC, camera);

      const baseY = waterMesh.userData.baseY ?? 0;
      intersectPlane.constant = -baseY;

      if (!raycaster.ray.intersectPlane(intersectPlane, hit)) return;
      if (
        hit.x < -HALF + 0.03 ||
        hit.x > HALF - 0.03 ||
        hit.z < -HALF + 0.03 ||
        hit.z > HALF - 0.03
      ) {
        moveX *= 0.9;
        moveY *= 0.9;
        return;
      }

      const gx = Math.round((hit.x + HALF) / DX);
      const gz = Math.round((hit.z + HALF) / DX);
      const impulse =
        speed *
        0.00012 *
        (1 + camera.position.length() * 0.06) *
        Math.min(1, dt * 60);

      const brush = 4;
      for (let dj = -brush; dj <= brush; dj++) {
        for (let di = -brush; di <= brush; di++) {
          const ci = gx + di;
          const cj = gz + dj;
          if (ci < 1 || ci >= N - 1 || cj < 1 || cj >= N - 1) continue;
          const dist = Math.hypot(di, dj) + 0.4;
          const k = idx(ci, cj);
          vel[k] += (impulse / dist) * (0.92 + ((ci ^ cj) & 7) * 0.02);
        }
      }

      moveX *= 0.65;
      moveY *= 0.65;
    }

    let prevClient = { x: 0, y: 0 };

    function onPointerMove(e) {
      moveX += e.movementX;
      moveY += e.movementY;
      prevClient.x = e.clientX;
      prevClient.y = e.clientY;
    }

    function pumpFromPour() {
      const cx = Math.floor(N / 2);
      const cz = Math.floor(N / 2);
      const r = 6;
      const falloff = Math.max(0, 1 - simTime / POUR_DURATION);
      const mag = 0.08 * falloff;
      for (let j = cz - r; j <= cz + r; j++) {
        for (let i = cx - r; i <= cx + r; i++) {
          if (i < 1 || i >= N - 1 || j < 1 || j >= N - 1) continue;
          const d = Math.hypot(i - cx, j - cz);
          if (d > r) continue;
          const k = idx(i, j);
          vel[k] += mag * (1 - d / r) * 0.04;
        }
      }
    }

    function init() {
      initBuffers();

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.08, 120);
      camera.position.set(3.55, 2.35, 4.45);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.02;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 2.3;
      controls.maxDistance = 14;
      controls.maxPolarAngle = Math.PI * 0.49;
      controls.target.set(0, 0.15, 0);

      const pmrem = new THREE.PMREMGenerator(renderer);
      const envScene = new THREE.Scene();
      envScene.background = new THREE.Color(0x111318);
      const envTex = pmrem.fromScene(envScene).texture;
      scene.environment = envTex;
      pmrem.dispose();

      scene.add(new THREE.AmbientLight(0x445566, 0.55));
      const key = new THREE.DirectionalLight(0xffffff, 1.1);
      key.position.set(5, 9, 4);
      scene.add(key);
      const rim = new THREE.DirectionalLight(0x88aadd, 0.4);
      rim.position.set(-6, 2, -7);
      scene.add(rim);

      scene.add(createGlassTank());

      waterMesh = createWaterMesh();
      scene.add(waterMesh);

      const built = createStreamVisual();
      streamGroup = built.group;
      streamGroup.userData = { positions: built.positions, dropPoints: built.dropPoints };
      scene.add(streamGroup);

      window.addEventListener('resize', onResize);
      window.addEventListener('pointermove', onPointerMove);
      document.getElementById('resetBtn').addEventListener('click', resetSimulation);

      prevClient.x = window.innerWidth * 0.5;
      prevClient.y = window.innerHeight * 0.45;
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.055);
      simTime += dt;

      const pourT = Math.min(1, simTime / POUR_DURATION);
      const ease = pourT * pourT * (3 - 2 * pourT);
      const fillLevel = ease * FILL_TARGET;
      const pourStrength = Math.max(0, 1 - pourT / 0.9);

      if (pourT < 1) pumpFromPour();

      const baseY = -HALF + 0.04 + fillLevel * (TANK - 0.12);
      waterMesh.userData.baseY = baseY;

      waveStep(dt, pourStrength * (pourT < 0.98 ? 1 : 0));
      applyMouseImpulse(dt);

      const pos = waterMesh.geometry.attributes.position;
      for (let j = 0; j < N; j++) {
        for (let i = 0; i < N; i++) {
          const k = idx(i, j);
          pos.setY(k, h[k]);
        }
      }
      pos.needsUpdate = true;
      waterMesh.geometry.computeVertexNormals();
      waterMesh.position.y = baseY;

      updateStreamVisual(pourStrength);

      controls.update();
      renderer.render(scene, camera);
    }

    init();
    animate();
  </script>
</body>
</html>
